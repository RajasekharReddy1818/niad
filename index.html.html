<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIAD</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #fdfdfd;
        }

        /* ABOUT BUTTON */
        .top-right {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 10;
        }

        .about-btn {
            background: transparent;
            border: none;
            letter-spacing: 2px;
            cursor: pointer;
        }

        /* CENTER */
        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo {
            width: 140px;
        }

        .tagline {
            margin-top: 10px;
            letter-spacing: 4px;
            font-size: 12px;
        }

        /* BUTTON */
        button {
            margin-top: 20px;
            padding: 10px 24px;
            border: 1px solid black;
            background: transparent;
        }

            button:hover {
                background: black;
                color: white;
            }

        /* OVERLAY */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.3);
            opacity: 0;
            pointer-events: none;
            transition: .3s;
        }

            .overlay.active {
                opacity: 1;
                pointer-events: auto;
            }

        /* PRODUCTS PANEL */
        .panel {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            max-width: 1100px;
            margin: auto;
            right: 0;
            height: 80vh;
            background: #fafafa;
            border-radius: 20px 20px 0 0;
            transition: .4s;
            padding: 20px;
            overflow-y: auto;
        }

            .panel.active {
                bottom: 0;
            }

        /* ABOUT PANEL */
        .right-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 350px;
            height: 100%;
            background: #fafafa;
            padding: 25px;
            transition: .4s;
        }

            .right-panel.active {
                right: 0;
            }

        /* HEADER */
        .panel-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .close-btn {
            cursor: pointer;
        }

        /* GRID (desktop) */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* CARD */
        .card {
            height: 320px;
            border-radius: 15px;
            overflow: hidden;
        }

            .card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        /* ABOUT */
        .about-content {
            line-height: 1.7;
            color: #444;
        }

        /* 🔥 MOBILE FIX (THIS IS WHERE YOUR OLD SITE BROKE) */
        @media (max-width: 768px) {

            .panel {
                width: 100%;
                max-width: 100%;
                border-radius: 20px 20px 0 0;
                height: 85vh;
            }

            .right-panel {
                width: 100%;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .card {
                height: 260px;
            }

            .logo {
                width: 110px;
            }
        }
    </style>
</head>

<body>

    <div class="top-right" id="aboutWrap">
        <button class="about-btn" onclick="openAbout()">ABOUT</button>
    </div>

    <div class="container">
        <img src="logo.png" class="logo">
        <div class="tagline">BY NIAD</div>
        <button onclick="openProducts()">ENTER</button>
    </div>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <!-- PRODUCTS -->
    <div class="panel" id="productsPanel">
        <div class="panel-header">
            <h3>Collection</h3>
            <span class="close-btn" onclick="closeAll()">✕</span>
        </div>

        <div class="grid">
            <div class="card"><img src="img1.jpeg"></div>
            <div class="card"><img src="img2.jpeg"></div>
            <div class="card"><img src="img3.jpeg"></div>
            <div class="card"><img src="img4.jpeg"></div>
        </div>
    </div>

    <!-- ABOUT -->
    <div class="right-panel" id="aboutPanel">
        <div class="panel-header">
            <h3>About NIAD</h3>
            <span class="close-btn" onclick="closeAll()">✕</span>
        </div>

        <div class="about-content">
            <p>NIAD was never created to be perfect.</p>

            <p>
                It lives in the space between raw, unfinished, and beautifully real.
                We believe beauty exists in imperfection.
            </p>

            <p>
                Every piece is intentionally imperfect.
            </p>

            <p><strong>Contact:</strong> by.niad@gmail.com</p>
        </div>
    </div>

    <script>
        function openProducts() {
            document.getElementById("productsPanel").classList.add("active");
            document.getElementById("overlay").classList.add("active");
        }

        function openAbout() {
            document.getElementById("aboutPanel").classList.add("active");
            document.getElementById("overlay").classList.add("active");
            document.getElementById("aboutWrap").style.display = "none";
        }

        function closeAll() {
            document.getElementById("productsPanel").classList.remove("active");
            document.getElementById("aboutPanel").classList.remove("active");
            document.getElementById("overlay").classList.remove("active");
            document.getElementById("aboutWrap").style.display = "block";
        }
    </script>

</body>
</html>
