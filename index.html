<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIAD</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: #ffffff;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            z-index: 100;
            border-bottom: 2px solid black;
            border-radius: 0 0 14px 14px;
        }

        /* LOGO */
        .logo {
            width: 85px;
        }

        /* NAV LINKS */
        .nav-links {
            display: flex;
            gap: 18px;
            position: relative;
        }

            .nav-links button {
                border: none;
                background: none;
                cursor: pointer;
                font-size: 13px;
                color: black;
                transition: 0.25s;
            }

                .nav-links button:hover {
                    opacity: 0.6;
                    transform: translateY(-1px);
                }

        button, a {
            -webkit-tap-highlight-color: transparent;
            color: black;
        }

        /* DROPDOWN */
        .dropdown {
            position: absolute;
            top: 30px;
            right: 60px;
            background: white;
            border: 1px solid black;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            animation: fadeDown 0.25s ease;
        }

            .dropdown button {
                padding: 10px 20px;
            }

                .dropdown button:hover {
                    background: #f3f3f3;
                }

            .dropdown.active {
                display: flex;
            }

        /* GRID */
        .grid {
            margin-top: 120px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 240px));
            justify-content: center;
            gap: 20px;
            padding-bottom: 50px;
        }

        /* CARD */
        .card {
            width: 240px;
            height: 400px;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease forwards;
            transition: transform 0.25s ease;
        }

            .card:hover {
                transform: scale(1.02);
            }

            .card:active {
                transform: scale(0.98);
            }

            .card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        /* ARROWS */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            font-size: 18px;
            padding: 6px 10px;
            cursor: pointer;
            z-index: 2;
            transition: 0.2s;
        }

            .arrow:hover {
                background: black;
            }

        .left {
            left: 6px;
        }

        .right {
            right: 6px;
        }

        /* ABOUT OVERLAY */
        .about-overlay {
            position: fixed;
            inset: 0;
            background: #fafafa;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: 0.4s ease;
            padding: 30px 20px;
        }

            .about-overlay.active {
                opacity: 1;
                pointer-events: all;
                transform: translateY(0);
            }

        .about-content {
            max-width: 600px;
            margin: 60px auto;
            line-height: 1.7;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 20px;
            cursor: pointer;
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* MOBILE */
        @media (max-width: 768px) {

            .navbar {
                padding: 6px 14px;
            }

            .logo {
                width: 70px;
            }

            .grid {
                grid-template-columns: 1fr;
                justify-items: center;
                margin-top: 110px;
            }

            .card {
                width: 90%;
                margin: auto;
                aspect-ratio: 3 / 5;
                height: auto;
            }

            .dropdown {
                right: 0;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <img src="logo.jpeg" class="logo">

        <div class="nav-links">
            <button onclick="goHome()">HOME</button>
            <button onclick="toggleDropdown()">PRODUCTS</button>
            <button onclick="openAbout()">ABOUT</button>

            <div class="dropdown" id="dropdown">
                <button onclick="filterProducts('all')">ALL</button>
                <button onclick="filterProducts('chain')">CHAINS</button>
                <button onclick="filterProducts('ring')">RINGS</button>
                <button onclick="filterProducts('bracelet')">BRACELETS</button>
            </div>
        </div>
    </div>

    <!-- PRODUCTS -->
    <div class="grid">

        <!-- FEATURED CHAINS -->
        <div class="card featured" data-type="chain" data-images="img1.jpeg,img1b.jpeg,img1c.jpeg">
            <button class="arrow left" onclick="prevImage(this)">‹</button>
            <img src="img1.jpeg">
            <button class="arrow right" onclick="nextImage(this)">›</button>
        </div>

        <div class="card featured" data-type="chain" data-images="img4.jpeg,img4b.jpeg">
            <button class="arrow left" onclick="prevImage(this)">‹</button>
            <img src="img4.jpeg">
            <button class="arrow right" onclick="nextImage(this)">›</button>
        </div>

        <!-- OTHER PRODUCTS -->
        <div class="card" data-type="bracelet" data-images="img2.jpeg,img2b.jpeg">
            <button class="arrow left" onclick="prevImage(this)">‹</button>
            <img src="img2.jpeg">
            <button class="arrow right" onclick="nextImage(this)">›</button>
        </div>

        <div class="card" data-type="bracelet" data-images="img3.jpeg,img3b.jpeg">
            <button class="arrow left" onclick="prevImage(this)">‹</button>
            <img src="img3.jpeg">
            <button class="arrow right" onclick="nextImage(this)">›</button>
        </div>

    </div>

    <!-- ABOUT -->
    <div class="about-overlay" id="aboutOverlay">
        <span class="close-btn" onclick="closeAbout()">✕</span>

        <div class="about-content">
            <h2>About NIAD</h2>
            <p>NIAD was never created to be perfect.</p>
            <p>We believe beauty exists in imperfection.</p>
            <p><strong>Contact:</strong> by.niad@gmail.com</p>
        </div>
    </div>

    <script>

        function toggleDropdown() {
            document.getElementById("dropdown").classList.toggle("active");
        }

        /* DEFAULT VIEW */
        function showFeatured() {
            let cards = document.querySelectorAll(".card");
            cards.forEach(card => {
                if (card.classList.contains("featured")) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }

        /* FILTER */
        function filterProducts(type) {
            let cards = document.querySelectorAll(".card");

            cards.forEach((card, index) => {
                if (type === "all" || card.dataset.type === type) {
                    card.style.display = "block";
                    card.style.animationDelay = index * 0.08 + "s";
                } else {
                    card.style.display = "none";
                }
            });

            document.getElementById("dropdown").classList.remove("active");
        }

        /* HOME */
        function goHome() {
            showFeatured();
            closeAbout();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        /* ABOUT */
        function openAbout() {
            document.getElementById("aboutOverlay").classList.add("active");
        }

        function closeAbout() {
            document.getElementById("aboutOverlay").classList.remove("active");
        }

        /* IMAGE SWITCH */
        function nextImage(btn) {
            let card = btn.parentElement;
            let img = card.querySelector("img");

            let images = card.dataset.images.split(",");
            let current = images.indexOf(img.src.split("/").pop());

            current = (current + 1) % images.length;
            img.src = images[current];
        }

        function prevImage(btn) {
            let card = btn.parentElement;
            let img = card.querySelector("img");

            let images = card.dataset.images.split(",");
            let current = images.indexOf(img.src.split("/").pop());

            current = (current - 1 + images.length) % images.length;
            img.src = images[current];
        }

        /* INITIAL LOAD */
        showFeatured();

    </script>

</body>
</html>
