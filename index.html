<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIAD</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: #ffffff;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            z-index: 100;
            border-bottom: 2px solid black;
            border-radius: 0 0 14px 14px;
        }

        /* LOGO */
        .logo {
            width: 85px;
        }

        /* NAV LINKS */
        .nav-links {
            display: flex;
            gap: 18px;
            position: relative;
        }

            .nav-links button {
                border: none;
                background: none;
                cursor: pointer;
                font-size: 13px;
                color: black;
                transition: all 0.25s ease;
            }

                .nav-links button:hover {
                    opacity: 0.6;
                    transform: translateY(-1px);
                }

        /* REMOVE BLUE TAP */
        button, a {
            -webkit-tap-highlight-color: transparent;
            color: black;
        }

        /* DROPDOWN */
        .dropdown {
            position: absolute;
            top: 30px;
            right: 60px;
            background: white;
            border: 1px solid black;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            animation: fadeDown 0.25s ease;
        }

            .dropdown button {
                padding: 10px 20px;
                text-align: left;
            }

                .dropdown button:hover {
                    background: #f3f3f3;
                }

            .dropdown.active {
                display: flex;
            }

        /* GRID */
        .grid {
            margin-top: 120px;
            display: grid;
            grid-template-columns: repeat(4, 240px);
            gap: 20px;
            justify-content: center;
            padding-bottom: 50px;
        }

        /* CARD */
        .card {
            width: 240px;
            height: 400px;
            border-radius: 14px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease forwards;
            transition: transform 0.25s ease;
        }

            .card:hover {
                transform: scale(1.02);
            }

            .card:active {
                transform: scale(0.98);
            }

            .card img {
                width: 100%;
                height: 100%;
                object-fit: cover; /* KEEP THIS */
            }

        /* ABOUT PANEL */
        .about-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 90%;
            max-width: 350px;
            height: 100vh;
            background: #fafafa;
            border-left: 2px solid black;
            transform: translateX(100%);
            transition: 0.4s ease;
            padding: 20px;
            z-index: 200;
        }

            .about-panel.active {
                transform: translateX(0);
            }

        .close-btn {
            cursor: pointer;
            font-size: 18px;
            float: right;
            transition: 0.2s;
        }

            .close-btn:hover {
                transform: scale(1.2);
            }

        /* ANIMATIONS */
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* MOBILE */
        @media (max-width: 768px) {

            .navbar {
                padding: 6px 14px;
            }

            .logo {
                width: 70px;
            }

            .grid {
                grid-template-columns: 1fr;
                margin-top: 110px;
            }

            .card {
                width: 90%;
                margin: auto;
                aspect-ratio: 3 / 5; /* FIX IMAGE CONSISTENCY */
                height: auto;
            }

            .dropdown {
                right: 0;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <img src="logo.png" class="logo">

        <div class="nav-links">
            <button onclick="goHome()">HOME</button>
            <button onclick="toggleDropdown()">PRODUCTS</button>
            <button onclick="openAbout()">ABOUT</button>

            <div class="dropdown" id="dropdown">
                <button onclick="filterProducts('all')">ALL</button>
                <button onclick="filterProducts('chain')">CHAINS</button>
                <button onclick="filterProducts('ring')">RINGS</button>
                <button onclick="filterProducts('bracelet')">BRACELETS</button>
            </div>
        </div>
    </div>

    <!-- PRODUCTS -->
    <div class="grid">

        <div class="card" data-type="chain"><img src="img1.jpeg"></div>
        <div class="card" data-type="ring"><img src="img2.jpeg"></div>
        <div class="card" data-type="bracelet"><img src="img3.jpeg"></div>
        <div class="card" data-type="chain"><img src="img4.jpeg"></div>

    </div>

    <!-- ABOUT -->
    <div class="about-panel" id="aboutPanel">
        <span class="close-btn" onclick="closeAbout()">✕</span>
        <h3>About NIAD</h3>

        <p>NIAD was never created to be perfect.</p>

        <p>
            It lives in the space between raw, unfinished, and beautifully real.
            We believe beauty exists in imperfection.
        </p>

        <p>Every piece is intentionally imperfect.</p>

        <p><strong>Contact:</strong> by.niad@gmail.com</p>
    </div>

    <script>

        function toggleDropdown() {
            document.getElementById("dropdown").classList.toggle("active");
        }

        function filterProducts(type) {
            let cards = document.querySelectorAll(".card");

            cards.forEach((card, index) => {
                if (type === "all" || card.dataset.type === type) {
                    card.style.display = "block";
                    card.style.animationDelay = index * 0.08 + "s";
                } else {
                    card.style.display = "none";
                }
            });

            document.getElementById("dropdown").classList.remove("active");
        }

        function goHome() {
            filterProducts("all");
            closeAbout();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function openAbout() {
            document.getElementById("aboutPanel").classList.add("active");
        }

        function closeAbout() {
            document.getElementById("aboutPanel").classList.remove("active");
        }

    </script>

</body>
</html>
