<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>NIAD</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: #fdfdfd;
            overflow: hidden; /* 🔥 NO SCROLL ANYWHERE */
        }

        /* ABOUT BUTTON */
        .top-right {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 20;
            transition: 0.3s;
        }

            .top-right.hidden {
                opacity: 0;
                pointer-events: none;
            }

        /* CENTER */
        .container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo {
            width: 140px;
        }

        .tagline {
            margin-top: 10px;
            letter-spacing: 4px;
            font-size: 12px;
        }

        /* BUTTON */
        button {
            margin-top: 20px;
            padding: 10px 24px;
            border: 1px solid black;
            background: transparent;
            cursor: pointer;
        }

        /* OVERLAY */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.3);
            opacity: 0;
            pointer-events: none;
            transition: .3s;
            z-index: 10;
        }

            .overlay.active {
                opacity: 1;
                pointer-events: auto;
            }

        /* PRODUCTS PANEL */
        .panel {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%);
            width: 100%;
            max-width: 1100px;
            height: 100dvh; /* 🔥 FULL HEIGHT */
            background: #fafafa;
            border-radius: 20px 20px 0 0;
            transition: transform 0.4s ease;
            padding: 20px;
            overflow: hidden; /* 🔥 NO SCROLL */
            z-index: 15;
        }

            .panel.active {
                transform: translate(-50%, 0);
            }

        /* ABOUT PANEL */
        .right-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            max-width: 380px;
            height: 100dvh;
            background: #fafafa;
            transform: translateX(100%);
            transition: transform 0.4s ease;
            padding: 20px;
            overflow: hidden; /* 🔥 NO SCROLL */
            z-index: 25;
        }

            .right-panel.active {
                transform: translateX(0);
            }

        /* HEADER */
        .panel-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .close-btn {
            cursor: pointer;
        }

        /* GRID */
        .grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* CARD */
        .card {
            width: 220px;
            height: 380px; /* slightly reduced to fit */
            border-radius: 15px;
            overflow: hidden;
        }

            .card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        /* ABOUT */
        .about-content {
            font-size: 14px;
            line-height: 1.5;
            color: #444;
        }

        /* MOBILE */
        @media (max-width: 768px) {

            .panel {
                left: 0;
                transform: translateY(100%);
                max-width: 100%;
                width: 100%;
                height: 100dvh;
                border-radius: 20px 20px 0 0;
            }

                .panel.active {
                    transform: translateY(0);
                }

            .grid {
                flex-direction: column;
                align-items: center;
            }

            .card {
                width: 90%;
                max-width: 260px;
                height: 340px; /* adjusted to fit */
            }

            .right-panel {
                max-width: 100%;
            }

            .about-content {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="top-right" id="aboutWrap">
        <button onclick="openAbout()">ABOUT</button>
    </div>

    <div class="container">
        <img src="logo.png" class="logo">
        <div class="tagline">BY NIAD</div>
        <button onclick="openProducts()">ENTER</button>
    </div>

    <div class="overlay" id="overlay" onclick="closeAll()"></div>

    <!-- PRODUCTS -->
    <div class="panel" id="productsPanel">
        <div class="panel-header">
            <h3>Collection</h3>
            <span class="close-btn" onclick="closeAll()">✕</span>
        </div>

        <div class="grid">
            <div class="card"><img src="img1.jpeg"></div>
            <div class="card"><img src="img2.jpeg"></div>
            <div class="card"><img src="img3.jpeg"></div>
            <div class="card"><img src="img4.jpeg"></div>
        </div>
    </div>

    <!-- ABOUT -->
    <div class="right-panel" id="aboutPanel">
        <div class="panel-header">
            <h3>About NIAD</h3>
            <span class="close-btn" onclick="closeAll()">✕</span>
        </div>

        <div class="about-content">
            <p>NIAD was never created to be perfect.</p>
            <p>
                It lives in the space between raw, unfinished, and beautifully real.
                We believe beauty exists in imperfection.
            </p>
            <p>
                Every piece is intentionally imperfect, designed to feel authentic.
            </p>
            <p><strong>Contact:</strong> by.niad@gmail.com</p>
        </div>
    </div>

    <script>
        function openProducts() {
            document.getElementById("productsPanel").classList.add("active");
            document.getElementById("overlay").classList.add("active");
            document.getElementById("aboutWrap").classList.add("hidden");
        }

        function openAbout() {
            document.getElementById("aboutPanel").classList.add("active");
            document.getElementById("overlay").classList.add("active");
            document.getElementById("aboutWrap").classList.add("hidden");
        }

        function closeAll() {
            document.getElementById("productsPanel").classList.remove("active");
            document.getElementById("aboutPanel").classList.remove("active");
            document.getElementById("overlay").classList.remove("active");
            document.getElementById("aboutWrap").classList.remove("hidden");
        }
    </script>

</body>
</html>
