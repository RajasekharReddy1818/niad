<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIAD</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: #ffffff;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            z-index: 100;
            border-bottom: 2px solid black;
            border-radius: 0 0 14px 14px;
        }

        .logo {
            width: 85px;
        }

        .nav-links {
            display: flex;
            gap: 18px;
            position: relative;
        }

            .nav-links button {
                border: none;
                background: none;
                cursor: pointer;
                font-size: 13px;
                color: black;
                transition: 0.25s;
            }

                .nav-links button:hover {
                    opacity: 0.6;
                    transform: translateY(-1px);
                }

        /* DROPDOWN */
        .dropdown {
            position: absolute;
            top: 30px;
            right: 60px;
            background: white;
            border: 1px solid black;
            border-radius: 8px;
            display: none;
            flex-direction: column;
        }

            .dropdown.active {
                display: flex;
            }

            .dropdown button {
                padding: 10px 20px;
            }

        /* 🔥 HOME HERO (NEW) */
        .home {
            margin-top: 70px;
            display: flex;
            height: calc(100vh - 70px);
        }

            .home img {
                width: 50%;
                height: 100%;
                object-fit: cover;
            }

        /* GRID */
        .grid {
            display: none;
            margin-top: 120px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 240px));
            justify-content: center;
            gap: 20px;
            padding-bottom: 50px;
        }

        /* CARD */
        .card {
            width: 240px;
            height: 400px;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
        }

            .card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        /* ARROWS */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
        }

        .left {
            left: 6px;
        }

        .right {
            right: 6px;
        }

        /* ABOUT */
        .about-overlay {
            position: fixed;
            inset: 0;
            background: #fafafa;
            z-index: 300;
            display: none;
        }

            .about-overlay.active {
                display: block;
            }

        /* MOBILE */
        @media (max-width: 768px) {

            .home {
                flex-direction: column;
                height: auto;
            }

                .home img {
                    width: 100%;
                    height: 50vh;
                }

            .grid {
                grid-template-columns: 1fr;
                justify-items: center;
                margin-top: 110px;
            }

            .card {
                width: 90%;
                aspect-ratio: 3/5;
                height: auto;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <img src="logo.jpeg" class="logo">

        <div class="nav-links">
            <button onclick="goHome()">HOME</button>
            <button onclick="toggleDropdown()">PRODUCTS</button>
            <button onclick="openAbout()">ABOUT</button>

            <div class="dropdown" id="dropdown">
                <button onclick="filterProducts('all')">ALL</button>
                <button onclick="filterProducts('chain')">CHAINS</button>
                <button onclick="filterProducts('bracelet')">BRACELETS</button>
            </div>
        </div>
    </div>

    <!-- 🔥 HOME DISPLAY -->
    <div class="home" id="homeSection">
        <img src="img1.jpeg">
        <img src="img4.jpeg">
    </div>

    <!-- PRODUCTS -->
    <div class="grid" id="productGrid">

        <div class="card" data-type="chain" data-images="img1.jpeg,img1b.jpeg">
            <button class="arrow left" onclick="prevImage(this)">‹</button>
            <img src="img1.jpeg">
            <button class="arrow right" onclick="nextImage(this)">›</button>
        </div>

        <div class="card" data-type="chain" data-images="img4.jpeg,img4b.jpeg">
            <button class="arrow left" onclick="prevImage(this)">‹</button>
            <img src="img4.jpeg">
            <button class="arrow right" onclick="nextImage(this)">›</button>
        </div>

        <div class="card" data-type="bracelet" data-images="img2.jpeg,img2b.jpeg">
            <button class="arrow left" onclick="prevImage(this)">‹</button>
            <img src="img2.jpeg">
            <button class="arrow right" onclick="nextImage(this)">›</button>
        </div>

    </div>

    <!-- ABOUT -->
    <div class="about-overlay" id="aboutOverlay">
        <span onclick="closeAbout()">✕</span>
        <div style="padding:40px;">
            <h2>About NIAD</h2>
            <p>Minimal. Imperfect. Real.</p>
        </div>
    </div>

    <script>

        function toggleDropdown() {
            document.getElementById("dropdown").classList.toggle("active");
        }

        /* SWITCH TO PRODUCTS */
        function showProducts() {
            document.getElementById("homeSection").style.display = "none";
            document.getElementById("productGrid").style.display = "grid";
        }

        /* HOME */
        function goHome() {
            document.getElementById("homeSection").style.display = "flex";
            document.getElementById("productGrid").style.display = "none";
            closeAbout();
        }

        /* FILTER */
        function filterProducts(type) {
            showProducts();

            let cards = document.querySelectorAll(".card");

            cards.forEach(card => {
                if (type === "all" || card.dataset.type === type) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });

            document.getElementById("dropdown").classList.remove("active");
        }

        /* ABOUT */
        function openAbout() {
            document.getElementById("aboutOverlay").classList.add("active");
        }

        function closeAbout() {
            document.getElementById("aboutOverlay").classList.remove("active");
        }

        /* IMAGE SWITCH */
        function nextImage(btn) {
            let card = btn.parentElement;
            let img = card.querySelector("img");

            let images = card.dataset.images.split(",");
            let current = images.indexOf(img.src.split("/").pop());

            current = (current + 1) % images.length;
            img.src = images[current];
        }

        function prevImage(btn) {
            let card = btn.parentElement;
            let img = card.querySelector("img");

            let images = card.dataset.images.split(",");
            let current = images.indexOf(img.src.split("/").pop());

            current = (current - 1 + images.length) % images.length;
            img.src = images[current];
        }

        /* DEFAULT */
        goHome();

    </script>

</body>
</html>
